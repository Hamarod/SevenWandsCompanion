name: .NET MAUI Build

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'
    
    - name: Install MAUI Workload
      run: dotnet workload install maui
    
    - name: Build SevenwandsConsoleTool
      run: dotnet build SevenwandsConsoleTool/SevenwandsConsoleTool.csproj -c Release
    
    - name: Build SevenwandsCompanion for Windows
      run: dotnet build SevenwandsCompanion/SevenwandsCompanion.csproj -c Release -f net10.0-windows10.0.19041.0
    
    # 1. On compresse le dossier de build en un seul fichier ZIP
    - name: Zip Windows Build
      shell: pwsh
      run: |
        Compress-Archive -Path SevenwandsCompanion/bin/Release/net10.0-windows10.0.19041.0/* -DestinationPath SevenwandsCompanion_Windows.zip

    # 2. On upload l'artefact (optionnel, pour l'onglet Actions)
    - name: Upload Windows Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: SevenwandsCompanion_Windows.zip

    # 3. On crée la Release avec UNIQUEMENT le fichier ZIP
    - name: Create Release with Latest Tag
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: SevenWands Companion ${{ github.ref_name }}
        body: |
          🚀 **SevenWands Companion - Version ${{ github.ref_name }}**
          Téléchargez le fichier ZIP ci-dessous pour installer l'application.
        draft: false
        prerelease: false
        make_latest: true
        files: SevenwandsCompanion_Windows.zip  # Un seul fichier = plus d'erreur !
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
