name: .NET MAUI Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'
    
    - name: Install MAUI Workload
      run: dotnet workload install maui
    
    - name: Restore dependencies
      run: dotnet restore SevenWandsCompanion.sln
    
    - name: Build Windows
      run: dotnet build SevenWandsCompanion/SevenWandsCompanion.csproj -f net10.0-windows10.0.19041.0 -c Release
    
    - name: Upload Windows Build Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: windows-build
        path: |
          SevenWandsCompanion/bin/Release/net10.0-windows10.0.19041.0/
