name: .NET MAUI Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Install MAUI Workload
      run: dotnet workload install maui

    - name: Restore dependencies
      run: dotnet restore SevenwandsCompanion/SevenwandsCompanion.csproj

    - name: Build Windows
      run: dotnet build SevenwandsCompanion/SevenwandsCompanion.csproj -c Release /p:TargetFrameworks=net10.0-windows10.0.19041.0

    - name: Upload Windows Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: |
          SevenwandsCompanion/bin/Release/net10.0-windows10.0.19041.0/
