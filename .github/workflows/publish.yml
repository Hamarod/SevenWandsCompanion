name: Publish SevenWandsCompanion

on:
  push:
    tags:
      - 'v*' # Se déclenche sur v1.0, v1.1.0.0, etc.
  workflow_dispatch: # Permet de lancer le build manuellement depuis l'onglet Actions

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI Workloads
        run: dotnet workload install maui

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Restore Dependencies
        run: dotnet restore SevenwandsCompanion/SevenwandsCompanion.csproj

      - name: Decode Keystore
        shell: pwsh
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" > keystore_base64.txt
          certutil -decode keystore_base64.txt "${{ github.workspace }}/my-release-key.keystore"

      - name: Publish Android
        shell: pwsh
        run: |
          dotnet publish SevenwandsCompanion/SevenwandsCompanion.csproj `
            -c Release `
            -f net10.0-android `
            -p:AndroidKeyStore=true `
            -p:AndroidSigningKeyStore="${{ github.workspace }}/my-release-key.keystore" `
            -p:AndroidSigningKeyAlias='${{ secrets.KEY_ALIAS }}' `
            -p:AndroidSigningKeyPass='${{ secrets.KEY_PASSWORD }}' `
            -p:AndroidSigningStorePass='${{ secrets.KEY_PASSWORD }}' `
            --no-restore

      - name: Publish Windows MSIX
        run: |
          dotnet publish SevenwandsCompanion/SevenwandsCompanion.csproj `
            -c Release `
            -f net10.0-windows10.0.19041.0 `
            -p:GenerateAppxPackageOnBuild=true `
            -p:AppxPackageSigningEnabled=false `
            --no-restore

      - name: Zip Windows Build
        shell: pwsh
        run: |
          # Utilisation de slashes pour la compatibilité
          $publishPath = "SevenwandsCompanion/bin/Release/net10.0-windows10.0.19041.0/win10-x64/publish"
          if (Test-Path $publishPath) {
            Compress-Archive -Path "$publishPath/*" -DestinationPath "SevenwandsCompanion-Windows-${{ github.ref_name }}.zip"
            Write-Host "✅ Archive Windows créée avec succès"
          } else {
            Write-Warning "⚠️ Chemin de publication Windows introuvable: $publishPath"
          }

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SevenwandsCompanion/bin/Release/net10.0-android/*-Signed.apk
            SevenwandsCompanion/bin/Release/net10.0-android/publish/*.apk
            SevenwandsCompanion/bin/Release/net10.0-windows10.0.19041.0/**/*.msix
            SevenwandsCompanion-Windows-${{ github.ref_name }}.zip
          name: SevenWandsCompanion ${{ github.ref_name }}
          body: |
            🎯 **SevenWandsCompanion - Sevenwands Potion Maker**
            
            📱 Nouvelle version générée automatiquement.
            
            ### 📦 Téléchargements
            - **Android** : Fichier `.apk` (activez les sources inconnues)
            - **Windows** : Fichier `.zip` (dézippez et lancez l'exe)
            
            ---
            Version: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
